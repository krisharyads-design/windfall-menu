<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windfall Café Menu</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
    }

    .menu-frame {
      display: block;
      width: 100vw;
      height: 100dvh;
      border: 0;
      background: #000;
    }

    @supports not (height: 100dvh) {
      .menu-frame {
        height: 100vh;
      }
    }
  </style>
</head>
<body>
  <iframe
    class="menu-frame"
    src="public/menu.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH"
    title="Windfall Café Menu">
  </iframe>
</body>
</html>
